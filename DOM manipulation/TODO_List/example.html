<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <!-- If I use tailwind CSS classes then I need Tailwind CSS CDN in your <head> section.

    <script src="https://cdn.tailwindcss.com"></script> -->

    <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Centered box */
    .todo-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 30px;
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
    }

    /* Input area */
    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    #task-input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    #task-input:focus {
      outline: none;
      border-color: #667eea;
    }

    #add-task-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #add-task-btn:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.3);
    }

    #add-task-btn:active {
      transform: translateY(0);
    }

    /* Task list */
    #task-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
      scrollbar-width: none; 
      -ms-overflow-style: none;
    }

    #task-list li {
      background: #f8f9fa;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    #task-list li:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

     /* Checkbox animation */
    .task-checkbox:checked {
      animation: bounce 0.3s ease;
      accent-color: #dc3545;
    }
    
    @keyframes bounce {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.3);
      }
    }

    .task-text {
      flex: 1;
      font-size: 16px;
      color: #333;
      transition: all 0.3s;
    }

    /* Completed task style */
    .completed .task-text {
      text-decoration: line-through;
      color: #999;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .delete-btn:hover {
      background: #c82333;
      transform: scale(1.05);
    }

    .delete-btn:active {
      transform: scale(0.95);
    }


    /* Empty state */
    #task-list:empty::before {
      content: "✨ No tasks yet. Add one above! ✨";
      display: block;
      text-align: center;
      color: #999;
      padding: 40px;
      font-style: italic;
    }
  </style>
  </head>
  <body>
    <div class="todo-container">
      <h2>📝 Todo List</h2>

      <div class="input-section">
        <input type="text" id="task-input" placeholder="Enter a new task...">
        <button id="add-task-btn">Add Task</button>
      </div>

      <ul id="task-list"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
